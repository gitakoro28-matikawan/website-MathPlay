<!DOCTYPE html>
<html>
<head>
<title>MathPlay - Aljabar</title>

<link rel="stylesheet" href="style.css">

<script>

function cekJawaban(jawaban){

    if(jawaban === "benar"){
        alert("Jawaban benar!");
    }
    else{
        alert("Jawaban salah!");
    }

}

</script>

</head>

<body>

<h1>MathPlay</h1>
<h2>Latihan Aljabar</h2>

<div class="soal">

<p>1. Jika x + 5 = 12, berapakah nilai x?</p>

<button onclick="cekJawaban('salah')">5</button>
<button onclick="cekJawaban('salah')">6</button>
<button onclick="cekJawaban('benar')">7</button>
<button onclick="cekJawaban('salah')">8</button>
<p>2. Tentukan himpunan penyelesaian dari 2x+3 = 15</p>

<button onclick="cekJawaban('salah')">-6</button>
<button onclick="cekJawaban('salah')">6</button>
<button onclick="cekJawaban('benar')">-7</button>
<button onclick="cekJawaban('salah')">11</button>
</div>

</body>
</html>
